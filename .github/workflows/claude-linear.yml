name: Claude Code - Linear Ticket Automation

on:
  workflow_dispatch:
    inputs:
      linear_ticket_id:
        description: 'Linear ticket ID (e.g. TRD-42)'
        required: true
      linear_ticket_title:
        description: 'Ticket title'
        required: true
      linear_ticket_description:
        description: 'Ticket description'
        required: true

jobs:
  claude-code:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure git
        run: |
          git config user.name "Claude Code Bot"
          git config user.email "claude@tradingday.app"

      - name: Pre-flight checks
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TICKET_ID: ${{ github.event.inputs.linear_ticket_id }}
        run: |
          # Abort if a PR for this ticket already exists
          EXISTING=$(gh pr list --search "$TICKET_ID in:title" --state open --json number --jq 'length')
          if [ "$EXISTING" -gt 0 ]; then
            echo "An open PR for $TICKET_ID already exists. Aborting."
            exit 1
          fi

      - name: Create branch
        id: branch
        env:
          TICKET_ID: ${{ github.event.inputs.linear_ticket_id }}
        run: |
          BRANCH="$TICKET_ID"
          # Append run number if branch already exists on remote
          if git ls-remote --exit-code --heads origin "$BRANCH" > /dev/null 2>&1; then
            BRANCH="${TICKET_ID}-${{ github.run_number }}"
          fi
          git checkout -b "$BRANCH"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Run Claude Code
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TICKET_ID: ${{ github.event.inputs.linear_ticket_id }}
          TICKET_TITLE: ${{ github.event.inputs.linear_ticket_title }}
          TICKET_DESCRIPTION: ${{ github.event.inputs.linear_ticket_description }}
        run: |
          cat > /tmp/claude-prompt.txt << EOF
          You are working on the TradingDay codebase. Read CLAUDE.md first for architecture guidance.

          Implement the following Linear ticket:

          Ticket: $TICKET_ID
          Title: $TICKET_TITLE
          Description: $TICKET_DESCRIPTION

          Instructions:
          - Read CLAUDE.md and the relevant source files before writing anything
          - Respect the Runner → Data → Core dependency direction; do not introduce cycles
          - Write or update tests; all tests must pass before committing
          - Commit all changes with the message: feat: $TICKET_ID $TICKET_TITLE
          - Do not push; the workflow handles that
          EOF

          claude --print \
            --model claude-sonnet-4-6 \
            --max-turns 20 \
            --allowedTools "Bash,Read,Write,Edit,Glob" \
            < /tmp/claude-prompt.txt

      - name: Push branch
        run: git push origin ${{ steps.branch.outputs.branch }}

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TICKET_ID: ${{ github.event.inputs.linear_ticket_id }}
          TICKET_TITLE: ${{ github.event.inputs.linear_ticket_title }}
          TICKET_DESCRIPTION: ${{ github.event.inputs.linear_ticket_description }}
        run: |
          gh pr create \
            --title "$TICKET_ID: $TICKET_TITLE" \
            --body "$(cat << EOF
          ## $TICKET_ID

          $TICKET_DESCRIPTION

          ---
          🤖 Implemented by Claude Code
          Closes $TICKET_ID
          EOF
          )" \
            --base master \
            --head "${{ steps.branch.outputs.branch }}"
