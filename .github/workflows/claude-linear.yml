name: Claude Code - Linear Ticket Automation

on:
  workflow_dispatch:
    inputs:
      linear_ticket_id:
        description: 'Linear ticket ID (e.g. TRD-42)'
        required: true
      linear_ticket_title:
        description: 'Ticket title'
        required: true
      linear_ticket_description:
        description: 'Ticket description'
        required: true

jobs:
  claude-code:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Ensures npm and node are available for Claude CLI

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Configure git
        run: |
          git config user.name "Claude Code Bot"
          git config user.email "claude@tradingday.app"

      - name: Pre-flight checks
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TICKET_ID: ${{ github.event.inputs.linear_ticket_id }}
        run: |
          EXISTING=$(gh pr list --search "$TICKET_ID in:title" --state open --json number --jq 'length')
          if [ "$EXISTING" -gt 0 ]; then
            echo "An open PR for $TICKET_ID already exists. Aborting."
            exit 1
          fi

      - name: Create branch
        id: branch
        env:
          TICKET_ID: ${{ github.event.inputs.linear_ticket_id }}
        run: |
          BRANCH="$TICKET_ID"
          if git ls-remote --exit-code --heads origin "$BRANCH" > /dev/null 2>&1; then
            BRANCH="${TICKET_ID}-${{ github.run_number }}"
          fi
          git checkout -b "$BRANCH"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Run Claude Code CLI directly
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Install the Claude Code CLI globally on the runner
          npm install -g @anthropic-ai/claude-code
          
          # Execute Claude directly in headless mode using -p (or --prompt)
          # We add --dangerously-skip-permissions to allow automated file edits in CI
          claude -p --max-turns 40 --model claude-sonnet-4-6 --dangerously-skip-permissions --allowed-tools Bash,Read,Write,Edit,Glob,LS -p "
          You are working on the TradingDay codebase. Read CLAUDE.md first for architecture guidance.
          
          Implement the following Linear ticket:
          
          Ticket: ${{ github.event.inputs.linear_ticket_id }}
          Title: ${{ github.event.inputs.linear_ticket_title }}
          Description:
          ${{ github.event.inputs.linear_ticket_description }}
          
          Instructions:
          - Read CLAUDE.md and the relevant source files before writing anything
          - Respect the Runner → Data → Core dependency direction; do not introduce cycles
          - Write or update tests; all tests must pass
          - Do not commit or push; the workflow handles that
          "

      - name: Commit changes
        env:
          TICKET_ID: ${{ github.event.inputs.linear_ticket_id }}
          TICKET_TITLE: ${{ github.event.inputs.linear_ticket_title }}
        run: |
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "feat: $TICKET_ID $TICKET_TITLE"
          fi
          COMMITS=$(git rev-list --count HEAD ^origin/master)
          if [ "$COMMITS" -eq 0 ]; then
            echo "No commits on branch — Claude made no changes. Aborting."
            exit 1
          fi
          echo "$COMMITS commit(s) ready to push."

      - name: Push branch
        run: git push origin ${{ steps.branch.outputs.branch }}

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TICKET_ID: ${{ github.event.inputs.linear_ticket_id }}
          TICKET_TITLE: ${{ github.event.inputs.linear_ticket_title }}
          TICKET_DESCRIPTION: ${{ github.event.inputs.linear_ticket_description }}
        run: |
          printf '%s' "$TICKET_DESCRIPTION" > /tmp/ticket-description.txt
          {
            printf '## %s\n\n' "$TICKET_ID"
            cat /tmp/ticket-description.txt
            printf '\n\n---\n🤖 Implemented by Claude Code\nCloses %s\n' "$TICKET_ID"
          } > /tmp/pr-body.txt

          gh pr create \
            --title "$TICKET_ID: $TICKET_TITLE" \
            --body-file /tmp/pr-body.txt \
            --base master \
            --head "${{ steps.branch.outputs.branch }}"
