name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          prompt: |
            ${{ github.event.issue.body || github.event.comment.body || github.event.review.body }}

            ---
            If this task asks you to implement a Linear ticket, you MUST follow these steps in order:
            1. Before touching any code, create and switch to a git branch with the EXACT name given in the "Branch:" field of the task above. Run: git checkout -b <branch-name>
            2. Read CLAUDE.md to understand the architecture before writing anything.
            3. Implement the feature. Respect the Runner → Data → Core dependency direction. Write tests; all must pass.
            4. When done, create the pull request by running: gh pr create --title "<ticket-id>: <ticket-title>" --body "<summary>" --base master
            Never use Claude's default branch naming — always use the branch name from the task.

